<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <title>AR Marker Particle Effect</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <!-- AR.js：Marker Tracking 版本 -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="ui-panel">
    <div id="status">请将摄像头对准 Hiro Marker</div>
    <div id="hint">识别到图案 2 秒后，粒子会从中心向外扩散。</div>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="alpha: true; antialias: true"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
  >
    <!-- 
      preset="hiro" 是 AR.js 内置识别图案。
      之后你可以换成自己的 pattern 文件。
    -->
    <a-marker id="marker" preset="hiro">
      <!-- 整个特效容器：所有虚拟物体都会固定在 marker 的坐标系中 -->
      <a-entity id="effect-root" visible="false">

        <!-- 中心召唤圆环 -->
        <a-ring
          id="center-ring"
          position="0 0.02 0"
          rotation="-90 0 0"
          radius-inner="0.18"
          radius-outer="0.28"
          color="#9DEBFF"
          opacity="0.85"
          transparent="true"
          animation="property: rotation; to: -90 0 360; loop: true; dur: 3000; easing: linear"
        ></a-ring>

        <!-- 第二层扩散圆环 -->
        <a-ring
          id="pulse-ring"
          position="0 0.025 0"
          rotation="-90 0 0"
          radius-inner="0.35"
          radius-outer="0.37"
          color="#FFFFFF"
          opacity="0.45"
          transparent="true"
        ></a-ring>

        <!-- 粒子会由 JS 自动生成到这里 -->
        <a-entity id="particle-field"></a-entity>

        <!-- 中心漂浮光球 -->
        <a-sphere
          id="core-orb"
          position="0 0.55 0"
          radius="0.08"
          color="#FFFFFF"
          opacity="0.9"
          transparent="true"
          animation="property: position; dir: alternate; to: 0 0.75 0; loop: true; dur: 1400; easing: easeInOutSine"
        ></a-sphere>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
