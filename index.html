<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <title>AR Marker Particle Effect</title>

  <!-- 稳定版 A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="ui-panel">
    <div id="status">请将摄像头对准 Hiro Marker</div>
    <div id="hint">识别到图案 2 秒后，粒子会从中心向外扩散。</div>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="alpha: true; antialias: true; precision: mediump;"
    arjs="
      sourceType: webcam;
      sourceWidth: 1280;
      sourceHeight: 720;
      displayWidth: 1280;
      displayHeight: 720;
      debugUIEnabled: false;
      detectionMode: mono;
    "
  >
    <a-marker id="marker" preset="hiro">
      <a-entity id="effect-root" visible="false">

        

        <a-ring
          id="pulse-ring"
          position="0 0.025 0"
          rotation="-90 0 0"
          radius-inner="0.35"
          radius-outer="0.37"
          color="#FFFFFF"
          opacity="0.45"
          transparent="true"
        ></a-ring>

        <a-entity id="particle-field"></a-entity>

        <a-sphere
          id="core-orb"
          position="0 0.55 0"
          radius="0.08"
          color="#FFFFFF"
          opacity="0.9"
          transparent="true"
          animation="property: position; dir: alternate; to: 0 0.75 0; loop: true; dur: 1400; easing: easeInOutSine"
        ></a-sphere>

      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script src="script.js"></script>
</body>
</html>
